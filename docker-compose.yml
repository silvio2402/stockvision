services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DATABASE=stockvision
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ERP_PRODUCT_URL=https://hook.eu1.make.celonis.com/79j69cp1aesv98zwozwgpduz86hk71rr
      - ERP_PRODUCTS_LIST_URL=https://hook.eu1.make.celonis.com/2dkavnxbe1o4rns7k75r1ej9yqflfa7x
      - IMAGE_STORAGE_PATH=/app/data/images
      - APP_PASSWORD=${APP_PASSWORD:-stockvision}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - image_data:/app/data/images
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - server

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  mongo_data:
  image_data:
